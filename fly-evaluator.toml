# Repath Evaluator — Fly.io deployment config
# Python worker that consumes the repath:evaluations Redis stream,
# scores each LLM response with gpt-4o-mini as judge, and writes
# evaluations to PostgreSQL so the controller can make rollout decisions.

app = "repath-evaluator"
primary_region = "sin"   # Same region as gateway to minimise Redis latency

[build]
  dockerfile = "Dockerfile.evaluator"

[env]
  REPATH_CONSUMER_NAME   = "fly-worker-1"
  REPATH_LOG_LEVEL       = "info"
  REPATH_LOG_FORMAT      = "json"
  REPATH_LLM_JUDGE_MODEL = "gpt-4o-mini"

# No HTTP service — this is a pure worker process.
# Fly keeps it alive via process supervisor; auto-restart on crash.
[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"

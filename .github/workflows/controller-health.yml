name: Controller Health Check

on:
  schedule:
    # Every 5 minutes
    - cron: "*/5 * * * *"
  # Allow manual triggering for debugging
  workflow_dispatch:

# Only run on the real repo — forks and mirrors skip this entirely.
# The check is inside the job rather than at the workflow level so that
# workflow_dispatch still shows up in the UI on any fork (it just exits early).

jobs:
  health-check:
    name: Check repath-controller status
    runs-on: ubuntu-latest
    if: github.repository == 'repathhq/repath'

    permissions:
      issues: write
      id-token: write

    env:
      AWS_REGION: ap-south-1

    steps:
      - name: Configure AWS credentials (OIDC — no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check controller container health via SSM
        id: status
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.AWS_EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["docker inspect --format={{.State.Health.Status}} repath-controller 2>&1 || echo not-found"]' \
            --query "Command.CommandId" --output text)

          for i in $(seq 1 12); do
            sleep 5
            STATUS_CHECK=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.AWS_EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            if [[ "$STATUS_CHECK" == "Success" || "$STATUS_CHECK" == "Failed" ]]; then break; fi
          done

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.AWS_EC2_INSTANCE_ID }}" \
            --query "StandardOutputContent" --output text)
          echo "status_output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if echo "$OUTPUT" | grep -q "healthy"; then
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue if controller is down
        if: steps.status.outputs.healthy == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --label "controller-down" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already open — adding comment."
            gh issue comment "$EXISTING" \
              --repo "$GITHUB_REPOSITORY" \
              --body "$(cat <<'BODY'
          Still down at ${{ github.run_id }} ($(date -u +"%Y-%m-%dT%H:%M:%SZ")).

          **docker health status:**
          \`\`\`
          ${{ steps.status.outputs.status_output }}
          \`\`\`
          BODY
          )"
          else
            echo "No open issue found — creating one."
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "🚨 Controller down" \
              --label "controller-down" \
              --body "$(cat <<'BODY'
          ## Controller health check failed

          The `repath-controller` container on EC2 is not reporting healthy.

          **Detected at:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          **docker health status:**
          \`\`\`
          ${{ steps.status.outputs.status_output }}
          \`\`\`

          ### Recovery steps
          1. Connect via `aws ssm start-session --target <instance-id>` (no SSH key needed)
          2. `docker ps -a` / `docker logs repath-controller` — check for panic / OOM
          3. `docker compose -f /opt/repath/docker-compose.prod.yml restart controller`
          4. If crash-looping, check the `REPATH_DATABASE_URL` SSM parameter and recent deploys
          BODY
          )"
          fi

      - name: Log healthy status
        if: steps.status.outputs.healthy == 'true'
        run: echo "Controller is healthy."

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust: lint + test ────────────────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (zero warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all -- --test-threads=1

      - name: Release build (verify it compiles)
        run: cargo build --release

  # ── Python: lint + test ──────────────────────────────────────────────────────
  python:
    name: Python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: evaluators
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: evaluators
        run: ruff check src/ tests/

      - name: Run tests
        working-directory: evaluators
        env:
          REPATH_DATABASE_URL: "postgres://x:x@localhost/x"
        run: pytest tests/ -v

  # ── Dashboard: type-check + build ────────────────────────────────────────────
  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Type-check
        working-directory: dashboard
        run: npx tsc --noEmit

      - name: Production build
        working-directory: dashboard
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8080"
          NEXT_PUBLIC_API_TOKEN: "ci-test-token"
          NEXT_PUBLIC_GATEWAY_URL: "http://localhost:8080"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          REPATH_API_TOKEN: "ci-test-token"
          JWT_SECRET: "ci-jwt-secret-must-be-32-chars-long"
        run: npm run build

  # ── Docker: verify images build ──────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [rust, python, dashboard]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: gateway
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build controller image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: controller
          push: false

      - name: Build evaluator image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: evaluator
          push: false

  # ── Security: dependency audit ───────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2025-0119 \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2025-0134

      - name: Audit Python dependencies
        working-directory: evaluators
        run: pip install pip-audit && pip-audit

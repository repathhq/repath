name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Rust fast gate (fmt + clippy + check, no compile) ─────────────────────
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (zero warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Type-check (no codegen)
        run: cargo check --all-targets --all-features

  # ── 2. Rust integration tests against real Postgres ──────────────────────────
  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    needs: [rust-check]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: repath
          POSTGRES_PASSWORD: repath
          POSTGRES_DB: repath_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U repath -d repath_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://repath:repath@localhost:5432/repath_test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Run tests (4 threads, real Postgres)
        run: cargo test --all -- --test-threads=4

  # ── 3. Rust release build + artifact upload (main only) ──────────────────────
  rust-build:
    name: Rust Build
    runs-on: ubuntu-latest
    needs: [rust-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Release build
        run: cargo build --release --bin repath-gateway --bin repath-controller

      - name: Upload gateway binary
        uses: actions/upload-artifact@v4
        with:
          name: repath-gateway
          path: target/release/repath-gateway
          retention-days: 1

      - name: Upload controller binary
        uses: actions/upload-artifact@v4
        with:
          name: repath-controller
          path: target/release/repath-controller
          retention-days: 1

  # ── 4. Python lint + tests (parallel with rust-check) ────────────────────────
  python-test:
    name: Python Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: evaluators
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: evaluators
        run: ruff check src/ tests/

      - name: Run tests
        working-directory: evaluators
        run: pytest tests/ -v

  # ── 5. Dashboard type-check + build (parallel with rust-check) ───────────────
  dashboard-check:
    name: Dashboard Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Type-check
        working-directory: dashboard
        run: npx tsc --noEmit

      - name: Production build
        working-directory: dashboard
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8080"
          NEXT_PUBLIC_API_TOKEN: "ci-test-token"
          NEXT_PUBLIC_GATEWAY_URL: "http://localhost:8080"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          REPATH_API_TOKEN: "ci-test-token"
          JWT_SECRET: "ci-jwt-secret-must-be-32-chars-long"
        run: npm run build

  # ── 6. Security audit (parallel with rust-check) ─────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit Rust dependencies
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2025-0119 \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2024-0421 \
            --ignore RUSTSEC-2024-0437

      - name: Set up Python 3.12 for pip-audit
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit Python dependencies
        working-directory: evaluators
        run: |
          python -m venv /tmp/audit-venv
          /tmp/audit-venv/bin/pip install --upgrade pip --quiet
          /tmp/audit-venv/bin/pip install pip-audit -e "." --quiet
          /tmp/audit-venv/bin/pip-audit --skip-editable

  # ── 7. Docker image builds + push to ECR (depends on rust-build + all parallel checks) ─
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [rust-build, python-test, dashboard-check, security-audit]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write # required for AWS OIDC
      contents: read

    env:
      AWS_REGION: ap-south-1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC — no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Gateway: uses Dockerfile.gateway (NOT the multi-stage Dockerfile with
      # target=gateway — that produced the wrong image in the past).
      - name: Build & push gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.gateway
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/repath/gateway:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/repath/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push controller image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.controller
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/repath/controller:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/repath/controller:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Evaluator: uses Dockerfile.evaluator (dedicated Python image, no Rust)
      - name: Build & push evaluator image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.evaluator
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/repath/evaluator:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/repath/evaluator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 8. Deploy to EC2 via SSM (main branch push only) ──────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ap-south-1

    steps:
      - name: Configure AWS credentials (OIDC — no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Redeploy on EC2 via SSM Session Manager (no SSH)
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.AWS_EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"curl -fsSL https://raw.githubusercontent.com/repathhq/repath/main/scripts/deploy-aws.sh | IMAGE_TAG=${{ github.sha }} bash\"]" \
            --query "Command.CommandId" --output text)

          echo "SSM command: $COMMAND_ID — waiting for completion..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.AWS_EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "  status: $STATUS"
            if [[ "$STATUS" == "Success" ]]; then exit 0; fi
            if [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.AWS_EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done
          echo "ERROR: deploy did not finish in time"
          exit 1

  # ── 9. Failure notification (runs only when deploy fails) ────────────────────
  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()

    steps:
      - name: Report deploy failure
        run: |
          echo "========================================"
          echo "  DEPLOY FAILED"
          echo "  Workflow : $GITHUB_WORKFLOW"
          echo "  Run      : $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          echo "  Commit   : $GITHUB_SHA"
          echo "  Ref      : $GITHUB_REF"
          echo "========================================"
          # To add Slack: uncomment and set SLACK_WEBHOOK_URL secret
          # curl -X POST -H 'Content-type: application/json' \
          #   --data "{\"text\":\"Repath deploy failed — <$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID|view run>\"}" \
          #   "${{ secrets.SLACK_WEBHOOK_URL }}"

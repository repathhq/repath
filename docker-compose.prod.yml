# Production compose file for the single EC2 host.
# Images are pulled from ECR (built + pushed by CI) instead of built locally.
# Secrets are provided via a .env file generated at deploy time from AWS SSM
# Parameter Store (see scripts/deploy-aws.sh) — never committed.

services:
  redis:
    image: redis:7-alpine
    container_name: repath-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - repath
    restart: unless-stopped

  gateway:
    image: ${ECR_REGISTRY}/repath/gateway:${IMAGE_TAG:-latest}
    container_name: repath-gateway
    environment:
      REPATH_SERVER_PORT: 8080
      REPATH_DATABASE_URL: ${REPATH_DATABASE_URL}
      REPATH_REDIS_URL: redis://redis:6379
      REPATH_API_TOKEN: ${REPATH_API_TOKEN}
      REPATH_CLOUD_MODE: "true"
      REPATH_CLOUD_DOMAIN: ${REPATH_CLOUD_DOMAIN}
      RUST_LOG: info
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:9090:9090"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - repath
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  evaluator:
    image: ${ECR_REGISTRY}/repath/evaluator:${IMAGE_TAG:-latest}
    container_name: repath-evaluator
    environment:
      REPATH_DATABASE_URL: ${REPATH_DATABASE_URL}
      REPATH_REDIS_URL: redis://redis:6379
      REPATH_OPENAI_API_KEY: ${OPENAI_API_KEY}
      REPATH_LOG_FORMAT: json
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - repath
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  controller:
    image: ${ECR_REGISTRY}/repath/controller:${IMAGE_TAG:-latest}
    container_name: repath-controller
    environment:
      REPATH_DATABASE_URL: ${REPATH_DATABASE_URL}
      RUST_LOG: info
    ports:
      - "127.0.0.1:9091:9091"
    networks:
      - repath
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  redis_data:
    driver: local

networks:
  repath:
    driver: bridge

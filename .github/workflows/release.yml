name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: repath-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: repath-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: repath-macos-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --bin repath-gateway \
            --bin repath-controller \
            --bin repath

      - name: Package binaries
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/repath-gateway dist/${{ matrix.artifact }}/
          cp target/${{ matrix.target }}/release/repath-controller dist/${{ matrix.artifact }}/
          cp target/${{ matrix.target }}/release/repath dist/${{ matrix.artifact }}/
          cp .env.example dist/${{ matrix.artifact }}/
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  create-release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: "**/*.tar.gz"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}

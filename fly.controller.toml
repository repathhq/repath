# Repath Controller — Fly.io deployment config
# Background worker: polls every 30s, makes advance/rollback decisions.
# No HTTP service — DB + controller collocated for low latency.

app = "repath-controller"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile.controller"

[env]
  RUST_LOG = "info,repath_controller=debug"
  REPATH_CONTROLLER_DECISION_INTERVAL_SECONDS = "30"

# Expose the metrics/health port internally so Fly health checks work
# and Prometheus can scrape. Not exposed to the public internet.
[[services]]
  protocol = "tcp"
  internal_port = 9091
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

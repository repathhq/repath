name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Rust fast gate (fmt + clippy + check, no compile) ─────────────────────
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (zero warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Type-check (no codegen)
        run: cargo check --all-targets --all-features

  # ── 2. Rust integration tests against real Postgres ──────────────────────────
  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    needs: [rust-check]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: repath
          POSTGRES_PASSWORD: repath
          POSTGRES_DB: repath_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U repath -d repath_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://repath:repath@localhost:5432/repath_test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Run tests (4 threads, real Postgres)
        run: cargo test --all -- --test-threads=4

  # ── 3. Rust release build + artifact upload (main only) ──────────────────────
  rust-build:
    name: Rust Build
    runs-on: ubuntu-latest
    needs: [rust-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Release build
        run: cargo build --release --bin repath-gateway --bin repath-controller

      - name: Upload gateway binary
        uses: actions/upload-artifact@v4
        with:
          name: repath-gateway
          path: target/release/repath-gateway
          retention-days: 1

      - name: Upload controller binary
        uses: actions/upload-artifact@v4
        with:
          name: repath-controller
          path: target/release/repath-controller
          retention-days: 1

  # ── 4. Python lint + tests (parallel with rust-check) ────────────────────────
  python-test:
    name: Python Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: evaluators
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: evaluators
        run: ruff check src/ tests/

      - name: Run tests
        working-directory: evaluators
        run: pytest tests/ -v

  # ── 5. Dashboard type-check + build (parallel with rust-check) ───────────────
  dashboard-check:
    name: Dashboard Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Type-check
        working-directory: dashboard
        run: npx tsc --noEmit

      - name: Production build
        working-directory: dashboard
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8080"
          NEXT_PUBLIC_API_TOKEN: "ci-test-token"
          NEXT_PUBLIC_GATEWAY_URL: "http://localhost:8080"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          REPATH_API_TOKEN: "ci-test-token"
          JWT_SECRET: "ci-jwt-secret-must-be-32-chars-long"
        run: npm run build

  # ── 6. Security audit (parallel with rust-check) ─────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit Rust dependencies
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2025-0119 \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2024-0421 \
            --ignore RUSTSEC-2024-0437

      - name: Set up Python 3.12 for pip-audit
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit Python dependencies
        working-directory: evaluators
        run: |
          python -m venv /tmp/audit-venv
          /tmp/audit-venv/bin/pip install --upgrade pip --quiet
          /tmp/audit-venv/bin/pip install pip-audit -e "." --quiet
          /tmp/audit-venv/bin/pip-audit --skip-editable

  # ── 7. Docker image builds (depends on rust-build + all parallel checks) ─────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [rust-build, python-test, dashboard-check, security-audit]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Gateway: uses Dockerfile.gateway (NOT the multi-stage Dockerfile with
      # target=gateway — that produced the wrong image in the past).
      - name: Build gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.gateway
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build controller image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.controller
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Evaluator: uses Dockerfile.evaluator (dedicated Python image, no Rust)
      - name: Build evaluator image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.evaluator
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 8. Deploy to Fly.io (main branch push only, ordered with health checks) ───
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      # Controller first: it is the source of truth for advance/rollback decisions.
      # The gateway must never run ahead of a stale controller.
      - name: Deploy controller
        run: flyctl deploy --config fly.controller.toml --remote-only

      - name: Wait for controller to reach started state
        run: |
          echo "Waiting 60s for controller machines to stabilise..."
          sleep 60
          STATUS=$(flyctl status --app repath-controller)
          echo "$STATUS"
          if ! echo "$STATUS" | grep -q "started"; then
            echo "ERROR: No machine in 'started' state after deploy."
            exit 1
          fi

      - name: Deploy gateway
        run: flyctl deploy --config fly.toml --remote-only

      - name: Deploy evaluator
        run: flyctl deploy --config fly.evaluator.toml --remote-only

  # ── 9. Failure notification (runs only when deploy fails) ────────────────────
  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()

    steps:
      - name: Report deploy failure
        run: |
          echo "========================================"
          echo "  DEPLOY FAILED"
          echo "  Workflow : $GITHUB_WORKFLOW"
          echo "  Run      : $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          echo "  Commit   : $GITHUB_SHA"
          echo "  Ref      : $GITHUB_REF"
          echo "========================================"
          # To add Slack: uncomment and set SLACK_WEBHOOK_URL secret
          # curl -X POST -H 'Content-type: application/json' \
          #   --data "{\"text\":\"Repath deploy failed — <$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID|view run>\"}" \
          #   "${{ secrets.SLACK_WEBHOOK_URL }}"

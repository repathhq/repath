# Repath Gateway — Fly.io deployment config
# Free tier: shared-cpu-1x, 256MB RAM, 160GB bandwidth/month

app = "repath-gateway"
primary_region = "sin"   # Singapore — closest to India + SEA

[build]
  dockerfile = "Dockerfile.gateway"

[env]
  REPATH_SERVER_PORT = "8080"
  REPATH_SERVER_HOST = "0.0.0.0"
  RUST_LOG = "info"
  REPATH_CLOUD_MODE = "true"
  REPATH_CLOUD_DOMAIN = "repath-gateway.fly.dev"

# HTTP service
[[services]]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 1000
    soft_limit = 800

  [[services.http_checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "20s"
    method = "get"
    path = "/health"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

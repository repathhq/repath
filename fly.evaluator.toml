# Repath Evaluator — Fly.io deployment config
# Free tier: shared-cpu-1x, 256MB RAM

app = "repath-evaluator"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"
  target = "evaluator"

[env]
  REPATH_LOG_FORMAT = "json"
  REPATH_LOG_LEVEL = "INFO"
  REPATH_BATCH_SIZE = "5"

# No HTTP service — this is a background worker consuming Redis Streams
# Fly.io runs it as a worker process

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

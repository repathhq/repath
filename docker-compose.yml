services:
  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: repath-postgres
    environment:
      POSTGRES_DB: repath
      POSTGRES_USER: repath
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-repath_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repath -d repath"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - repath

  redis:
    image: redis:7-alpine
    container_name: repath-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"   # Bind to localhost only — Redis has no auth by default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - repath

  # ── Application services ─────────────────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway
    container_name: repath-gateway
    environment:
      REPATH_SERVER_PORT: 8080
      REPATH_DATABASE_URL: postgres://repath:${POSTGRES_PASSWORD:-repath_dev_password}@postgres:5432/repath
      REPATH_REDIS_URL: redis://redis:6379
      REPATH_API_TOKEN: ${REPATH_API_TOKEN:?REPATH_API_TOKEN is required — set it in .env}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "8080:8080"
      - "127.0.0.1:9090:9090"   # Metrics: localhost only (internal monitoring)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - repath
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  evaluator:
    build:
      context: .
      dockerfile: Dockerfile
      target: evaluator
    container_name: repath-evaluator
    environment:
      REPATH_DATABASE_URL: postgres://repath:${POSTGRES_PASSWORD:-repath_dev_password}@postgres:5432/repath
      REPATH_REDIS_URL: redis://redis:6379
      REPATH_OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required — set it in .env}
      REPATH_LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - repath
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  controller:
    build:
      context: .
      dockerfile: Dockerfile
      target: controller
    container_name: repath-controller
    environment:
      REPATH_DATABASE_URL: postgres://repath:${POSTGRES_PASSWORD:-repath_dev_password}@postgres:5432/repath
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - repath
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    container_name: repath-dashboard
    environment:
      NODE_ENV: production
      REPATH_API_TOKEN: ${REPATH_API_TOKEN}
      REPATH_GATEWAY_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-32chars}
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    networks:
      - repath
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  repath:
    driver: bridge
